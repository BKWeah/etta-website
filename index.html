<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETTA Trading Corporation | Liberian Cocoa & Coffee</title>
  <meta name="description" content="ETTA Trading Corporation - Liberian cocoa and coffee sourcing and trading company connecting farmer-grown produce to responsible global buyers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/png" href="images/etta-logo.png">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo">
        <img src="images/etta-logo.png" alt="ETTA Trading Corporation" id="nav-logo-img">
        <div class="nav-brand-text">
          <span class="nav-brand-name">ETTA</span>
          <span class="nav-brand-tagline">Trading Corporation</span>
        </div>
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <!-- Nav links injected by JS -->
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="hero" class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow" id="hero-eyebrow"></div>
      <h1 class="hero-headline" id="hero-headline"></h1>
      <p class="hero-subheadline" id="hero-subheadline"></p>
      <div class="hero-cta">
        <a href="#products" class="btn btn-primary" id="hero-cta-primary"></a>
        <a href="#about" class="btn btn-outline" id="hero-cta-secondary"></a>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
    <div class="hero-scroll">
      <a href="#about" class="scroll-indicator">
        <span>Scroll</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M19 12l-7 7-7-7"/>
        </svg>
      </a>
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="section about">
    <div class="container">
      <div class="about-grid">
        <div class="about-content">
          <span class="eyebrow" id="about-eyebrow"></span>
          <h2 id="about-headline"></h2>
          <p id="about-content"></p>
          <div class="about-values" id="about-values"></div>
        </div>
        <div class="about-image">
          <img id="about-image" src="" alt="ETTA Trading Corporation">
        </div>
      </div>
    </div>
  </section>

  <!-- Products Section -->
  <section id="products" class="section products">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="products-eyebrow"></span>
        <h2 id="products-headline"></h2>
        <p id="products-description"></p>
      </div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </section>

  <!-- Operations Section -->
  <section id="operations" class="section operations">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="operations-eyebrow"></span>
        <h2 id="operations-headline"></h2>
        <p id="operations-description"></p>
      </div>
      <div class="operations-content">
        <div class="operations-steps" id="operations-steps"></div>
        <div class="operations-image">
          <img id="operations-image" src="" alt="ETTA Operations">
        </div>
      </div>
    </div>
  </section>

  <!-- Sustainability Section -->
  <section id="sustainability" class="section sustainability">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="sustainability-eyebrow"></span>
        <h2 id="sustainability-headline"></h2>
        <p id="sustainability-description"></p>
      </div>
      <div class="sustainability-grid" id="sustainability-grid"></div>
    </div>
  </section>

  <!-- Leadership Section -->
  <section id="leadership" class="section leadership">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="leadership-eyebrow"></span>
        <h2 id="leadership-headline"></h2>
        <p id="leadership-description"></p>
      </div>
      <div class="ceo-profile" id="ceo-profile"></div>
      <div class="team-grid" id="team-grid"></div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section id="gallery" class="section gallery">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="gallery-eyebrow"></span>
        <h2 id="gallery-headline"></h2>
        <p id="gallery-description"></p>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="section contact">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow" id="contact-eyebrow"></span>
        <h2 id="contact-headline"></h2>
        <p id="contact-description"></p>
      </div>
      <div class="contact-grid">
        <div class="contact-form-wrapper">
          <form id="contact-form" class="contact-form" action="https://formspree.io/f/xkokvlar" method="POST">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required placeholder="Your full name">
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="company">Company / Organization</label>
              <input type="text" id="company" name="company" placeholder="Your company name">
            </div>
            <div class="form-group">
              <label for="interest">Interest</label>
              <select id="interest" name="interest" required>
                <option value="">Select your interest</option>
                <option value="cocoa-buying">Cocoa Buying</option>
                <option value="coffee-buying">Coffee Buying</option>
                <option value="partnership">Farmer Partnership</option>
                <option value="investment">Investment Inquiry</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required placeholder="Tell us about your inquiry..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Message</button>
          </form>
        </div>
        <div class="contact-info" id="contact-info"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <img src="images/etta-logo.png" alt="ETTA" class="footer-logo">
          <p id="footer-tagline"></p>
        </div>
        <div class="footer-links" id="footer-links"></div>
        <div class="footer-social" id="footer-social"></div>
      </div>
      <div class="footer-bottom">
        <p id="footer-copyright"></p>
      </div>
    </div>
  </footer>

  <!-- Gallery Lightbox -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#10094;</button>
    <button class="lightbox-next" aria-label="Next">&#10095;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <p id="lightbox-caption"></p>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
