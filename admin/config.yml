backend:
  name: github
  repo: ettatradingcorp/etta-website
  branch: main
  base_url: https://www.ettatradingcorp.com
  auth_endpoint: api/auth

# Enable editorial workflow for draft/publish workflow
publish_mode: editorial_workflow

# Media folder configuration
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Site URL for preview links
site_url: https://www.ettatradingcorp.com

display_url: https://www.ettatradingcorp.com

# Logo for CMS login screen
logo_url: /images/etta-logo.png

# Collections
collections:
  - name: "site"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Site Configuration"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Site Info"
            name: "site"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Logo", name: "logo", widget: "image", allow_multiple: false }
              - { label: "Favicon", name: "favicon", widget: "image", allow_multiple: false }

          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
                  - label: "Dropdown Items"
                    name: "dropdown"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subheadline", name: "subheadline", widget: "text" }
              - label: "Primary CTA"
                name: "cta_primary"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
              - label: "Secondary CTA"
                name: "cta_secondary"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
              - { label: "Background Image", name: "background_image", widget: "image" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Values"
                name: "values"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Products Section"
            name: "products"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Products"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Category", name: "category", widget: "select", options: ["Cocoa", "Coffee"] }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Image", name: "image", widget: "image" }
                  - label: "Specifications"
                    name: "specs"
                    widget: "list"
                    field: { label: "Spec", name: "spec", widget: "string" }

          - label: "Operations Section"
            name: "operations"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Sustainability Section"
            name: "sustainability"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Initiatives"
                name: "initiatives"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Icon", name: "icon", widget: "select", options: ["tree", "education", "community", "shield"] }

          - label: "Leadership Section"
            name: "leadership"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "CEO Profile"
                name: "ceo"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Bio", name: "bio", widget: "text" }
                  - { label: "Photo", name: "image", widget: "image" }
              - label: "Team Members"
                name: "team"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Bio", name: "bio", widget: "text" }
                  - { label: "Photo", name: "image", widget: "image" }

          - label: "Gallery Section"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }
                  - { label: "Caption", name: "caption", widget: "string" }

          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Formspree Endpoint", name: "formspree_endpoint", widget: "string" }
              - label: "Contact Info"
                name: "info"
                widget: "object"
                fields:
                  - { label: "Address", name: "address", widget: "string" }
                  - { label: "Phone", name: "phone", widget: "string" }
                  - { label: "Email", name: "email", widget: "string" }
                  - { label: "Business Hours", name: "hours", widget: "string" }
              - label: "Social Links"
                name: "social"
                widget: "object"
                fields:
                  - { label: "Facebook", name: "facebook", widget: "string", required: false }
                  - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
                  - { label: "Instagram", name: "instagram", widget: "string", required: false }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
